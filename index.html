<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쏘뉴웨딩 사회자 - 전문 MC 소개</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ── 필터 ── */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 10px 16px 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-chip {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid #e0e0e0;
            background: white;
            color: #666;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .filter-chip.active,
        .filter-chip:hover {
            border-color: #d4af37;
            background: #d4af37;
            color: white;
        }

        /* ── 카드 ── */
        .mc-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: 10px;
            background: white;
            border: 1px solid #f0f0f0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.2s ease;
            animation: cardFadeIn 0.2s ease;
        }
        .mc-card:hover {
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            transform: translateY(-1px);
            border-color: #e8d870;
        }
        .mc-card-image-wrapper {
            flex-shrink: 0;
            width: 88px;
            height: 88px;
            border-radius: 8px;
            overflow: hidden;
        }
        .mc-card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .placeholder-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5e9a0, #e8d870);
            font-size: 32px;
        }
        .mc-card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .mc-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }
        .mc-card-name {
            font-size: 16px;
            font-weight: 700;
            color: #111;
        }
        .mc-card-category-badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-premium  { background: #fff8e1; color: #b8860b; }
        .badge-warm     { background: #fff0f0; color: #c0504d; }
        .badge-energetic{ background: #f0fff4; color: #2e7d32; }
        .badge-stable   { background: #eff3ff; color: #1a56a0; }

        .mc-card-style {
            font-size: 12px;
            color: #d4af37;
            font-weight: 600;
            margin: 0 0 4px;
        }
        .mc-card-intro {
            font-size: 13px;
            color: #666;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.45;
        }
        .mc-card-cta {
            font-size: 12px;
            color: #d4af37;
            font-weight: 600;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .mc-card-cta::after {
            content: "›";
            font-size: 16px;
            transition: transform 0.2s;
        }
        .mc-card:hover .mc-card-cta::after {
            transform: translateX(3px);
        }

        /* ── 모달 ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            animation: fadeIn 0.2s ease;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 14px;
            max-width: 680px;
            width: 92%;
            max-height: 88vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.28s ease;
            position: relative;
        }
        .modal-handle {
            display: none;
            width: 36px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 10px auto 4px;
            flex-shrink: 0;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.08);
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s;
        }
        .modal-close:hover { background: #d4af37; color: white; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 유튜브 섹션 */
        .youtube-gallery {
            padding: 10px 12px 6px;
            border-bottom: 1px solid #f0f0f0;
        }
        .youtube-videos {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .youtube-videos::-webkit-scrollbar { display: none; }
        .youtube-video {
            height: 190px;
            aspect-ratio: 9/16;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            background: #f0f0f0;
        }
        .youtube-video iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .youtube-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
        }
        .youtube-more-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: rgba(212,175,55,0.08);
            color: #d4af37;
            border: 1px solid #d4af37;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .youtube-more-btn:hover {
            background: #d4af37;
            color: white;
        }

        /* MC 정보 */
        .modal-mc-info {
            display: flex;
            gap: 12px;
            padding: 10px 12px;
            background: #fafafa;
            align-items: flex-start;
        }
        .modal-mc-image {
            flex-shrink: 0;
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(135deg, #f5e9a0, #d4af37);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .modal-mc-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-mc-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .modal-name {
            font-size: 18px;
            font-weight: 700;
            color: #111;
            margin: 0;
        }
        .modal-style {
            font-size: 12px;
            color: #d4af37;
            font-weight: 600;
            margin: 0;
        }
        .modal-mbti {
            display: inline-block;
            font-size: 11px;
            color: #777;
            font-weight: 600;
            background: #efefef;
            padding: 2px 6px;
            border-radius: 4px;
            width: fit-content;
            margin: 0;
        }
        .modal-tags {
            font-size: 12px;
            color: #999;
            margin: 0;
            line-height: 1.4;
        }
        .modal-details {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            padding: 10px 12px 12px;
            margin: 0;
        }

        /* CTA 바 (모달 내부 고정 푸터) */
        .modal-cta-bar {
            flex-shrink: 0;
            padding: 10px 12px;
            background: white;
            border-top: 1px solid #f0f0f0;
        }
        .modal-cta {
            display: block;
            padding: 13px;
            background: linear-gradient(135deg, #FFE812 0%, #FFD700 100%);
            color: #333;
            text-align: center;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .modal-cta:hover {
            background: linear-gradient(135deg, #FFD700, #FFC700);
            transform: scale(1.01);
        }
        .modal-cta:active {
            transform: scale(0.99);
        }

        /* 모바일 바텀시트 */
        @media (max-width: 640px) {
            .modal.active {
                align-items: flex-end;
            }
            .modal-content {
                border-radius: 20px 20px 0 0;
                width: 100%;
                max-width: 100%;
                max-height: 92vh;
                animation: slideUpSheet 0.32s cubic-bezier(0.32, 0.72, 0, 1);
            }
            .modal-handle {
                display: block;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes slideUpSheet {
            from { transform: translateY(100%); }
            to   { transform: translateY(0);    }
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0);   }
        }
    </style>
</head>
<body class="bg-gray-50" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">

    <!-- 헤더 + 필터 (sticky) -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 pt-5 pb-2">
            <h1 class="text-2xl font-bold text-gray-900">전문 MC</h1>
            <p class="text-sm text-gray-500 mt-0.5">쏘뉴웨딩의 프로페셔널 사회자들</p>
        </div>
        <div class="filter-bar max-w-4xl mx-auto">
            <button class="filter-chip active" data-filter="all">전체</button>
            <button class="filter-chip" data-filter="premium">고급·세련</button>
            <button class="filter-chip" data-filter="warm">따뜻·감성</button>
            <button class="filter-chip" data-filter="energetic">밝고·활기</button>
            <button class="filter-chip" data-filter="stable">안정·신뢰</button>
        </div>
    </header>

    <!-- 메인 -->
    <main class="max-w-4xl mx-auto px-4 py-4">
        <div id="mc-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        <p id="no-results" class="text-center text-gray-400 py-16 text-sm" style="display:none;">
            해당 스타일의 사회자가 없습니다.
        </p>
    </main>

    <!-- 푸터 -->
    <footer class="bg-white border-t border-gray-100 mt-10">
        <div class="max-w-4xl mx-auto px-4 py-6">
            <p class="text-gray-400 text-xs text-center">© 2024 쏘뉴웨딩. All rights reserved.</p>
        </div>
    </footer>

    <!-- 모달 -->
    <div id="mc-modal" class="modal" onclick="handleModalBackdrop(event)">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <button class="modal-close" onclick="closeMCModal()">✕</button>

            <div class="modal-body" id="modal-body">
                <!-- 유튜브 갤러리 -->
                <div id="youtube-gallery" class="youtube-gallery" style="display:none;">
                    <div class="youtube-videos" id="youtube-container"></div>
                    <a id="youtube-channel-btn" class="youtube-more-btn" target="_blank" rel="noopener noreferrer" href="#">📺 더 많은 영상 보러가기</a>
                </div>

                <!-- MC 정보 -->
                <div class="modal-mc-info">
                    <div class="modal-mc-image" id="modal-mc-image">📸</div>
                    <div class="modal-mc-text">
                        <h2 class="modal-name" id="modal-name"></h2>
                        <p class="modal-style" id="modal-style"></p>
                        <span class="modal-mbti" id="modal-mbti"></span>
                        <p class="modal-tags" id="modal-tags"></p>
                    </div>
                </div>

                <!-- 상세 설명 -->
                <p class="modal-details" id="modal-details"></p>
            </div>

            <!-- CTA (모달 내부 고정 푸터) -->
            <div class="modal-cta-bar">
                <a id="modal-cta" class="modal-cta" target="_blank" rel="noopener noreferrer">상담하기</a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
